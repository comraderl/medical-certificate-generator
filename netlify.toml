[build]
  command = "cd client && npm install && npm run build"
  publish = "client/dist"

[functions]
  node_bundler = "esbuild"

[dev]
  command = "npm run dev --prefix client"
  targetPort = 5173
  framework = "#custom"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
